version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Pull models on first start
    command: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull phi3:mini &&
             ollama pull llama3.2:3b &&
             ollama pull mistral:7b &&
             wait"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    environment:
      - OLLAMA_HOST=ollama
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ollama:11434"]
      interval: 5s
      timeout: 3s
      retries: 20


  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-routing-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - AUDIT_DB_PATH=/app/data/audit.db
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    image: python:3.14-slim
    container_name: ai-routing-frontend
    working_dir: /app
    command: >
      sh -c "pip install streamlit requests sseclient-py plotly pandas &&
             streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ..:/app
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_models: